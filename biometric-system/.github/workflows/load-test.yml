name: Load test (manual)

on:
  workflow_dispatch:
    inputs:
      users:      { description: "Users",        default: "50" }
      spawn_rate: { description: "Spawn rate",   default: "5" }
      duration:   { description: "Run duration", default: "3m" }
      host:       { description: "Target host",  default: "http://localhost:8000" }

jobs:
  locust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: pip }
      - run: pip install locust loguru
      - run: |
          locust -f tests/load/locustfile.py \
            --host ${{ inputs.host }} \
            --headless \
            --users ${{ inputs.users }} \
            --spawn-rate ${{ inputs.spawn_rate }} \
            --run-time ${{ inputs.duration }} \
            --csv results/run --html results/report.html
      - uses: actions/upload-artifact@v4
        with:
          name: locust-report
          path: results/
