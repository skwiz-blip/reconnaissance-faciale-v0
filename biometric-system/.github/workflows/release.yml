name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write
  packages: write

jobs:
  release-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API (tag = ${{ github.ref_name }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.api
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/biometric-api:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}/biometric-api:latest
          platforms: linux/amd64,linux/arm64

      - name: Build & push Dashboard
        uses: docker/build-push-action@v6
        with:
          context: apps/dashboard
          file: apps/dashboard/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/biometric-dashboard:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}/biometric-dashboard:latest

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
