name: biometric_mobile
description: App mobile biométrique (login, scan visage, KYC).
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # HTTP + state
  dio: ^5.6.0
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7

  # Stockage sécurisé du token
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2

  # Caméra + biométrie
  camera: ^0.11.0
  image_picker: ^1.1.2
  local_auth: ^2.3.0

  # Permissions
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
