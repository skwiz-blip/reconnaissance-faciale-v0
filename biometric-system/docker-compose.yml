# ============================================================
# BIOMETRIC SYSTEM — Docker Compose (développement)
# Usage: docker compose up --build
# ============================================================

services:

  # ---- API Gateway (FastAPI) ----
  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    container_name: biometric-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./services/api-gateway:/app
      - ./services/ai-core:/app/ai_core
      # ML models (ONNX) — montés dans un dossier dédié pour éviter
      # le conflit avec le package Python /app/models (Pydantic schemas)
      - ./ml_models:/app/ml_models
    environment:
      - PYTHONPATH=/app:/app/ai_core
      # Surcharge REDIS_URL — dans le compose, le service s'appelle "redis"
      - REDIS_URL=redis://redis:6379/0
      # Surcharge MODEL_DIR pour utiliser le nouveau mount
      - MODEL_DIR=/app/ml_models
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - biometric-net

  # ---- Redis (cache + queue) ----
  redis:
    image: redis:7-alpine
    container_name: biometric-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - redis-data:/data
    networks:
      - biometric-net

  # ---- Celery Worker (tâches async) ----
  worker:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    container_name: biometric-worker
    restart: unless-stopped
    command: celery -A tasks worker --loglevel=info --concurrency=2
    volumes:
      - ./services/api-gateway:/app
      - ./services/ai-core:/app/ai_core
      - ./ml_models:/app/ml_models
    environment:
      - PYTHONPATH=/app:/app/ai_core
      - REDIS_URL=redis://redis:6379/0
      - MODEL_DIR=/app/ml_models
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - biometric-net

  # ---- Dashboard React (Phase 4) ----
  dashboard:
    build:
      context: ./apps/dashboard
      dockerfile: Dockerfile
    container_name: biometric-dashboard
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - api
    networks:
      - biometric-net

  # ---- Nginx reverse proxy (optionnel - prod uniquement) ----
  nginx:
    image: nginx:alpine
    container_name: biometric-nginx
    restart: unless-stopped
    profiles: ["prod"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - dashboard
    networks:
      - biometric-net

volumes:
  redis-data:

networks:
  biometric-net:
    driver: bridge
