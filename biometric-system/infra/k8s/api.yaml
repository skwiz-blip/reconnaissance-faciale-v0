apiVersion: apps/v1
kind: Deployment
metadata:
  name: biometric-api
  namespace: biometric
  labels: { app: biometric-api }
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxUnavailable: 0, maxSurge: 1 }
  selector: { matchLabels: { app: biometric-api } }
  template:
    metadata:
      labels: { app: biometric-api }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "8000"
        prometheus.io/path:   "/metrics"
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector: { matchLabels: { app: biometric-api } }
                topologyKey: kubernetes.io/hostname
      containers:
        - name: api
          image: ghcr.io/your-org/biometric-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - { name: http, containerPort: 8000 }
          envFrom:
            - configMapRef: { name: biometric-config }
            - secretRef:    { name: biometric-secrets }
          # Si tu utilises des GPU NVIDIA (nvidia-device-plugin installé):
          resources:
            requests:
              cpu: "1000m"
              memory: "2Gi"
              # nvidia.com/gpu: 1
            limits:
              cpu: "4000m"
              memory: "6Gi"
              # nvidia.com/gpu: 1
          volumeMounts:
            - { name: models, mountPath: /models }
          startupProbe:
            httpGet: { path: /health, port: 8000 }
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: models
          persistentVolumeClaim: { claimName: biometric-models-pvc }
      terminationGracePeriodSeconds: 45

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: biometric-models-pvc
  namespace: biometric
spec:
  accessModes: ["ReadOnlyMany"]
  resources: { requests: { storage: 5Gi } }

---
apiVersion: v1
kind: Service
metadata:
  name: biometric-api
  namespace: biometric
spec:
  selector: { app: biometric-api }
  ports:
    - { name: http, port: 80, targetPort: 8000 }
  type: ClusterIP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: biometric-api-hpa
  namespace: biometric
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: biometric-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
    - type: Resource
      resource:
        name: memory
        target: { type: Utilization, averageUtilization: 80 }
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies: [{ type: Percent, value: 50, periodSeconds: 60 }]
    scaleUp:
      stabilizationWindowSeconds: 30
      policies: [{ type: Percent, value: 100, periodSeconds: 30 }]

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: biometric-api-pdb
  namespace: biometric
spec:
  minAvailable: 1
  selector: { matchLabels: { app: biometric-api } }
