apiVersion: v1
kind: ConfigMap
metadata:
  name: biometric-config
  namespace: biometric
data:
  APP_ENV: "production"
  APP_HOST: "0.0.0.0"
  APP_PORT: "8000"
  DEBUG: "false"

  # CORS prod
  CORS_ORIGINS: "https://dashboard.your-domain.com,https://mobile.your-domain.com"

  # IA
  FACE_DETECTION_MODEL: "buffalo_l"
  EMBEDDING_MODEL: "arcface_r100"
  ANTI_SPOOF_MODEL: "minivision"
  MODEL_DIR: "/models"
  SIMILARITY_THRESHOLD: "0.6"
  LIVENESS_THRESHOLD: "0.5"
  KYC_FACE_MATCH_THRESHOLD: "0.70"
  OCR_LANGUAGES: "fra+eng"

  # Perf
  GPU_ENABLED: "true"
  BATCH_SIZE: "8"
  MAX_FACES_PER_FRAME: "10"
  FPS_TARGET: "30"

  # FAISS
  FAISS_RESYNC_INTERVAL_S: "600"

  # Cache
  REDIS_URL: "redis://biometric-redis:6379/0"
  CACHE_TTL: "300"
  RECOGNITION_CACHE_TTL: "30"

  # JWT
  JWT_EXPIRE_MINUTES: "15"
  REFRESH_TOKEN_EXPIRE_MINUTES: "43200"
  RATE_LIMIT_PER_MINUTE: "120"

  # Chiffrement
  EMBEDDING_ENCRYPTION_ENABLED: "true"
