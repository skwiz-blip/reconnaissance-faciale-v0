apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: biometric-ingress
  namespace: biometric
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/websocket-services: "biometric-api"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.your-domain.com
        - dashboard.your-domain.com
      secretName: biometric-tls
  rules:
    - host: api.your-domain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: biometric-api
                port: { number: 80 }
    - host: dashboard.your-domain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: biometric-dashboard
                port: { number: 80 }
