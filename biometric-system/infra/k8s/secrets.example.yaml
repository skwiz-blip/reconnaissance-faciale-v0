# ============================================================
# COPIE ce fichier en `secrets.yaml` puis remplis les valeurs.
# Encode les valeurs en base64:  echo -n "valeur" | base64
# NE PAS COMMITER `secrets.yaml`.
#
# En production, préférer un opérateur (Sealed Secrets, External Secrets,
# Vault, AWS Secrets Manager) qui gère la rotation.
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: biometric-secrets
  namespace: biometric
type: Opaque
data:
  # openssl rand -hex 32 | base64
  SECRET_KEY: "<base64-encoded-32-char-secret>"

  # python -m security.encryption generate-key | base64
  EMBEDDING_ENCRYPTION_KEY: "<base64-encoded-hex-key>"

  # Supabase (dashboard > Settings > API)
  SUPABASE_URL: "<base64-encoded-https-url>"
  SUPABASE_ANON_KEY: "<base64-encoded-anon-key>"
  SUPABASE_SERVICE_KEY: "<base64-encoded-service-role-key>"
